name: YTtoMusic
options:
  bundleIdPrefix: com.octopusv
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.5.2"
    CURRENT_PROJECT_VERSION: "7"
    PRODUCT_NAME: YTtoMusic
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_APP_SANDBOX: NO

targets:
  YTtoMusic:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.octopusv.YTtoMusic
        INFOPLIST_KEY_CFBundleDisplayName: YTtoMusic
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        SUFeedURL: "https://raw.githubusercontent.com/octopusv/YouTube-applamusic-auto-download/main/appcast.xml"
        SUPublicEDKey: "oFaP9K2hsmtyFxar41bz6oeJ0J1aoTL2mriFBRmfcyk="
        SUEnableAutomaticChecks: true
        SUEnableInstallerLauncherService: true
